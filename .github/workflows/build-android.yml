name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Node ─────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build Vite web app ─────────────────────────────
      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ── 5. Setup Java ─────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 6. Setup Android SDK ──────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 7. Add Android platform (if not already present) ──
      - name: Add Android platform
        run: npx cap add android || echo "Android platform already exists"

      # ── 8. Sync Capacitor ─────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 9. Make gradlew executable ────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 10. Build Debug APK ───────────────────────────────
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # ── 11. Upload APK as artifact ────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DevSetu-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 12. Create GitHub Release on main push ────────────
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: DevSetu Android v${{ github.run_number }}
          body: |
            🕉️ **DevSetu Android App — Build #${{ github.run_number }}**

            📱 Download the APK below and install on your Android device.

            **How to install:**
            1. Download `app-debug.apk`
            2. On your Android phone: Settings → Security → Allow unknown sources
            3. Open the downloaded APK and install

            Built from commit: ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
