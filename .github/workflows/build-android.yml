name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppress Node.js 20 warnings

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Node 22 ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Setup Java 21 (must come before Android SDK) ───
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 4. Setup Android SDK ──────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Cache Gradle files ─────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 6. Install npm dependencies ───────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 7. Build Vite web app ─────────────────────────────
      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ── 8. Add Android platform ───────────────────────────
      - name: Add Android platform
        run: npx cap add android || echo "Android platform already exists"

      # ── 9. Sync Capacitor ─────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 10. Force Gradle to use setup-java JDK ────────────
      - name: Set Gradle JDK
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties
          echo "org.gradle.caching=true" >> android/gradle.properties

      # ── 11. Make gradlew executable ───────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 12. Build Debug APK (with retry) ──────────────────
      - name: Build Debug APK
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_on: error
          command: cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 13. Upload APK as artifact ────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DevSetu-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 14. Create GitHub Release on main push ────────────
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: DevSetu Android v${{ github.run_number }}
          body: |
            🕉️ **DevSetu Android App — Build #${{ github.run_number }}**

            📱 Download the APK below and install on your Android device.

            **How to install:**
            1. Download `app-debug.apk`
            2. On your Android phone: Settings → Security → Allow unknown sources
            3. Open the downloaded APK and install

            Built from commit: ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
